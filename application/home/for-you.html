<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
height:100%;
background:#0f0f0f;
font-family:Arial,Helvetica,sans-serif;
color:#ffffff;
overflow-y:scroll;
scrollbar-width:none;
}

body::-webkit-scrollbar{
display:none;
}

.page{
min-height:100vh;
padding:20px;
padding-bottom:90px;
position:relative;
}

.top-bar{
position:relative;
width:100%;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:30px;
}

.top-icon{
position:absolute;
top:0;
width:22px;
height:22px;
}

.top-left{
left:0;
}

.top-right{
right:0;
}

.top-icon img{
width:100%;
height:100%;
object-fit:contain;
display:block;
}

.top-text{
display:flex;
flex-direction:row;
align-items:center;
justify-content:center;
gap:14px;
font-size:14px;
}

.top-pill{
background:#1c1c1c;
padding:6px 14px;
border-radius:10px;
color:#ffffff;
}

.side-icons{
position:fixed;
right:14px;
bottom:90px;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

.side-item{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
gap:6px;
font-size:11px;
}

.side-item img{
width:26px;
height:26px;
object-fit:contain;
display:block;
}

.left-info{
position:fixed;
left:14px;
bottom:90px;
display:flex;
flex-direction:column;
align-items:flex-start;
gap:6px;
}

.left-info .bold-text{
font-weight:bold;
font-size:14px;
}

.left-info .regular-text{
font-size:12px;
color:#ffffff;
}

.left-info button{
margin-top:6px;
padding:6px 12px;
border-radius:10px;
border:none;
background:#1a1a1a;
color:#ffffff;
font-size:13px;
cursor:pointer;
}

.center-info{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
text-align:center;
z-index:1;
}

.center-info .bold-text{
font-weight:bold;
font-size:16px;
}

.center-info .regular-text{
font-size:14px;
color:#ffffff;
}

.center-info button{
margin-top:10px;
padding:10px 20px;
border-radius:10px;
border:none;
background:#1a1a1a;
color:#ffffff;
font-size:14px;
cursor:pointer;
}

.sheet-menu{
position:fixed;
bottom:-300px;
left:0;
width:100%;
background:#1a1a1a;
border-top-left-radius:10px;
border-top-right-radius:10px;
transition:bottom 0.3s ease;
padding:20px;
z-index:1000;
}

.sheet-bar{
width:40px;
height:5px;
background:#555;
border-radius:2.5px;
margin:0 auto 20px auto;
cursor:pointer;
}

.sheet-option{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
cursor:pointer;
}

.sheet-option span{
font-size:14px;
}

.sheet-option .checkbox{
width:18px;
height:18px;
border:2px solid #fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.sheet-option .checkbox div{
width:10px;
height:10px;
border-radius:50%;
background:#ffffff;
display:none;
}

.navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#1a1a1a;
display:flex;
align-items:center;
justify-content:space-around;
padding:0 10px;
}

.nav-icon{
width:24px;
height:24px;
flex:1;
display:flex;
justify-content:center;
}

.nav-icon img{
width:100%;
height:100%;
object-fit:contain;
display:block;
}
</style>
</head>

<body>

<div class="page">

<div class="top-bar">

<div class="top-icon top-left">
<a href="page-live.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/live.png" alt="Live"></a>
</div>

<div class="top-text">
<div>Nearby</div>
<div>Explore</div>
<div>Following</div>
<div class="top-pill">For You</div>
</div>

<div class="top-icon top-right">
<a href="page-search.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/search.png" alt="Search"></a>
</div>

</div>

<div class="side-icons">

<div class="side-item">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/miscellaneous/profile.png" alt="Profile">
</div>

<div class="side-item">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/filled/like.png" alt="Like">
<div>N/A</div>
</div>

<div class="side-item">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/filled/comment.png" alt="Comment">
<div>N/A</div>
</div>

<div class="side-item">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/filled/favourite.png" alt="Favourite">
<div>N/A</div>
</div>

<div class="side-item">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/filled/share.png" alt="Share">
<div>N/A</div>
</div>

<div class="side-item">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/miscellaneous/audio.png" alt="Post Audio">
</div>

</div>

<div class="left-info">
<div class="bold-text">Post Title</div>
<div class="regular-text">Post Caption</div>
<button>More</button>
</div>

<div class="center-info">
<div class="bold-text">API error</div>
<div class="regular-text">We're having trouble fetching content,<br>Please use a different API.</div>
<button id="openMenu">Default</button>
</div>

<div class="sheet-menu" id="sheetMenu">
<div class="sheet-bar" id="closeMenu"></div>
<div class="sheet-option" data-value="Musically"><span>Musically</span><div class="checkbox"><div></div></div></div>
<div class="sheet-option" data-value="TikTok V2"><span>TikTok V2</span><div class="checkbox"><div></div></div></div>
<div class="sheet-option" data-value="NexusTok V1"><span>NexusTok V1</span><div class="checkbox"><div></div></div></div>
</div>

<div class="navbar">

<div class="nav-icon">
<a href="page-home.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/filled/home.png" alt="Home"></a>
</div>

<div class="nav-icon">
<a href="https://nexustokdev.github.io/NexusTok/application/shop/landing-page.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/shop.png" alt="Shop"></a>
</div>

<div class="nav-icon">
<a href="https://nexustokdev.github.io/NexusTok/application/create/landing-page.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/create.png" alt="Create"></a>
</div>

<div class="nav-icon">
<a href="https://nexustokdev.github.io/NexusTok/application/inbox/main-inbox.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/inbox.png" alt="Inbox"></a>
</div>

<div class="nav-icon">
<a href="https://nexustokdev.github.io/NexusTok/application/profile/profile.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/profile.png" alt="Profile"></a>
</div>

</div>

<script>
const openMenuBtn = document.getElementById('openMenu');
const sheetMenu = document.getElementById('sheetMenu');
const closeMenuBar = document.getElementById('closeMenu');
const options = sheetMenu.querySelectorAll('.sheet-option');

openMenuBtn.addEventListener('click', ()=> {
sheetMenu.style.bottom = '0';
});

closeMenuBar.addEventListener('click', ()=> {
sheetMenu.style.bottom = '-300px';
});

options.forEach(option => {
option.addEventListener('click', ()=> {
options.forEach(opt => opt.querySelector('.checkbox div').style.display='none');
option.querySelector('.checkbox div').style.display='block';
openMenuBtn.textContent = option.dataset.value;
});
});
</script>

</body>
</html>
