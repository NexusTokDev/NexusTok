<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
height:100%;
background:#0f0f0f;
font-family:Arial,Helvetica,sans-serif;
color:#ffffff;
overflow-y:scroll;
scrollbar-width:none;
}

body::-webkit-scrollbar{
display:none;
}

.page{
min-height:100vh;
padding:20px;
padding-bottom:90px;
position:relative;
}

.top-bar{
position:relative;
width:100%;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:30px;
}

.top-icon{
position:absolute;
top:0;
width:22px;
height:22px;
}

.top-left{
left:0;
}

.top-right{
right:0;
}

.top-icon img{
width:100%;
height:100%;
object-fit:contain;
display:block;
}

.top-text{
display:flex;
flex-direction:row;
align-items:center;
justify-content:center;
gap:14px;
font-size:14px;
}

.top-pill{
background:#1c1c1c;
padding:6px 14px;
border-radius:10px;
color:#ffffff;
}

.side-icons{
position:fixed;
right:14px;
bottom:90px;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

.side-item{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
gap:6px;
font-size:11px;
}

.side-item img{
width:26px;
height:26px;
object-fit:contain;
display:block;
}

.navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#1a1a1a;
display:flex;
align-items:center;
justify-content:space-around;
padding:0 10px;
}

.nav-icon{
width:24px;
height:24px;
flex:1;
display:flex;
justify-content:center;
}

.nav-icon img{
width:100%;
height:100%;
object-fit:contain;
display:block;
}
</style>
</head>

<body>

<div class="page">

<div class="top-bar">

<div class="top-icon top-left">
<a href="page-live.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/live.png" alt="Live"></a>
</div>

<div class="top-text">
<div>Nearby</div>
<div>Explore</div>
<div>Following</div>
<div class="top-pill">For You</div>
</div>

<div class="top-icon top-right">
<a href="page-search.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/search.png" alt="Search"></a>
</div>

</div>

</div>

<div class="side-icons">

<div class="side-item">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/miscellaneous/profile.png" alt="Profile">
</div>

<div class="side-item">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/filled/like.png" alt="Like">
<div>N/A</div>
</div>

<div class="side-item">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/filled/comment.png" alt="Comment">
<div>N/A</div>
</div>

<div class="side-item">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/filled/favourite.png" alt="Favourite">
<div>N/A</div>
</div>

<div class="side-item">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/filled/share.png" alt="Share">
<div>N/A</div>
</div>

<div class="side-item">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/miscellaneous/audio.png" alt="Post Audio">
</div>

</div>

<div class="navbar">

<div class="nav-icon">
<a href="page-home.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/filled/home.png" alt="Home"></a>
</div>

<div class="nav-icon">
<a href="page-shop.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/shop.png" alt="Shop"></a>
</div>

<div class="nav-icon">
<a href="page-create.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/create.png" alt="Create"></a>
</div>

<div class="nav-icon">
<a href="page-inbox.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/inbox.png" alt="Inbox"></a>
</div>

<div class="nav-icon">
<a href="page-profile.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/profile.png" alt="Profile"></a>
</div>

</div>

</body>
</html>
