<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
height:100%;
background:#0f0f0f;
font-family:Arial,Helvetica,sans-serif;
color:#ffffff;
overflow-y:scroll;
scrollbar-width:none;
}

body::-webkit-scrollbar{
display:none;
}

.page{
min-height:100vh;
padding:20px;
padding-bottom:90px;
position:relative;
}

.top-bar{
position:relative;
width:100%;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:30px;
}

.top-icon{
position:absolute;
top:0;
width:26px;
height:26px;
}

.top-left{
left:0;
}

.top-right{
right:0;
}

.top-icon img{
width:100%;
height:100%;
object-fit:contain;
}

.top-text{
display:flex;
flex-direction:row;
align-items:center;
justify-content:center;
gap:14px;
font-size:14px;
}

.top-pill{
background:#1c1c1c;
padding:6px 14px;
border-radius:10px;
color:#ffffff;
}

.side-icons{
position:fixed;
right:14px;
bottom:90px;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

.side-item{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
gap:6px;
font-size:11px;
}

.side-item img{
width:26px;
height:26px;
object-fit:contain;
}

.navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#1a1a1a;
display:flex;
align-items:center;
justify-content:space-around;
}

.nav-icon{
width:28px;
height:28px;
}

.nav-icon img{
width:100%;
height:100%;
object-fit:contain;
}

</style>
</head>

<body>

<div class="page">

<div class="top-bar">

<div class="top-icon top-left">
<a href="https://1337https.github.io/ceedga/assets/media/icons/outlined/live.png"><img src=""></a>
</div>

<div class="top-text">
<div>Nearby</div>
<div>Explore</div>
<div>Following</div>
<div class="top-pill">For You</div>
</div>

<div class="top-icon top-right">
<a href="https://1337https.github.io/ceedga/assets/media/icons/outlined/search.png"><img src=""></a>
</div>

</div>

</div>

<div class="side-icons">

<div class="side-item">
<a href="https://1337https.github.io/ceedga/assets/media/images/profile-pictures/default.png"><img src=""></a>
</div>

<div class="side-item">
<a href="https://1337https.github.io/ceedga/assets/media/icons/filled/like.png"><img src=""></a>
<div>N/A</div>
</div>

<div class="side-item">
<a href="https://1337https.github.io/ceedga/assets/media/icons/filled/comment.png"><img src=""></a>
<div>N/A</div>
</div>

<div class="side-item">
<a href="https://1337https.github.io/ceedga/assets/media/icons/filled/favourite.png"><img src=""></a>
<div>N/A</div>
</div>

<div class="side-item">
<a href="https://1337https.github.io/ceedga/assets/media/icons/filled/share.png"><img src=""></a>
<div>N/A</div>
</div>

<div class="side-item">
<a href="https://1337https.github.io/ceedga/assets/media/icons/outlined/post-audio.png"><img src=""></a>
</div>

</div>

<div class="navbar">

<div class="nav-icon">
<a href="https://1337https.github.io/ceedga/assets/media/icons/filled/home.png"><img src=""></a>
</div>

<div class="nav-icon">
<a href="https://1337https.github.io/ceedga/assets/media/icons/outlined/shop.png"><img src=""></a>
</div>

<div class="nav-icon">
<a href="https://1337https.github.io/ceedga/assets/media/icons/outlined/create.png"><img src=""></a>
</div>

<div class="nav-icon">
<a href="https://1337https.github.io/ceedga/assets/media/icons/outlined/inbox.png"><img src=""></a>
</div>

<div class="nav-icon">
<a href="https://1337https.github.io/ceedga/assets/media/icons/outlined/profile.png"><img src=""></a>
</div>

</div>

</body>
</html>
