<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
height:100%;
background:#0f0f0f;
font-family:Arial,Helvetica,sans-serif;
color:#ffffff;
overflow-y:scroll;
scrollbar-width:none;
}

body::-webkit-scrollbar{
display:none;
}

.page{
min-height:100vh;
padding:20px;
padding-bottom:90px;
position:relative;
}

.top-bar{
position:relative;
width:100%;
height:30px;
}

.top-left-icons{
position:absolute;
left:0;
top:0;
display:flex;
gap:12px;
}

.top-right-icons{
position:absolute;
right:0;
top:0;
display:flex;
gap:12px;
}

.top-icon{
width:22px;
height:22px;
}

.top-icon img{
width:100%;
height:100%;
object-fit:contain;
display:block;
}

.banner{
width:100%;
height:140px;
margin-top:20px;
border-radius:10px;
overflow:hidden;
position:relative;
background-image:url("https://nexustokdev.github.io/NexusTok/assets/media/images/profile-banner.png");
background-size:cover;
background-position:center;
}

.banner::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
border-radius:10px;
}

.navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#1a1a1a;
display:flex;
align-items:center;
justify-content:space-around;
padding:0 10px;
}

.nav-icon{
width:24px;
height:24px;
flex:1;
display:flex;
justify-content:center;
}

.nav-icon img{
width:100%;
height:100%;
object-fit:contain;
display:block;
}
</style>
</head>

<body>

<div class="page">

<div class="top-bar">

<div class="top-left-icons">

<div class="top-icon">
<a href="#">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/find-friends.png" alt="Find Friends">
</a>
</div>

<div class="top-icon">
<a href="#">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/profile-visits.png" alt="Profile Visits">
</a>
</div>

</div>

<div class="top-right-icons">

<div class="top-icon">
<a href="#">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/share-profile.png" alt="Share Profile">
</a>
</div>

<div class="top-icon">
<a href="#">
<img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/menu.png" alt="Menu">
</a>
</div>

</div>

</div>

<div class="banner"></div>

</div>

<div class="navbar">

<div class="nav-icon">
<a href="page-home.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/filled/home.png" alt="Home"></a>
</div>

<div class="nav-icon">
<a href="https://nexustokdev.github.io/NexusTok/application/shop/landing-page.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/shop.png" alt="Shop"></a>
</div>

<div class="nav-icon">
<a href="https://nexustokdev.github.io/NexusTok/application/create/landing-page.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/create.png" alt="Create"></a>
</div>

<div class="nav-icon">
<a href="https://nexustokdev.github.io/NexusTok/application/inbox/main-inbox.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/inbox.png" alt="Inbox"></a>
</div>

<div class="nav-icon">
<a href="https://nexustokdev.github.io/NexusTok/application/profile/profile.html"><img src="https://nexustokdev.github.io/NexusTok/assets/media/icons/outlined/profile.png" alt="Profile"></a>
</div>

</div>

</body>
</html>
